<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha das Potências - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #0f3460; --accent: #e94560; --gold: #f1c40f; --success: #27ae60; 
            --dark: #1a1a2e; --card-bg: #ffffff; --text: #1a1a2e; --bg: #1a1a2e;
            --danger: #e74c3c;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 10px; }

        .banner-wrapper { width: 100%; max-width: 800px; margin-bottom: 25px; background: #16213e; border-radius: 20px; border: 2px solid #444; overflow: hidden; position: relative; height: 120px; cursor: pointer; }
        .slide { position: absolute; inset: 0; display: flex; align-items: center; padding: 10px 20px; opacity: 0; visibility: hidden; transition: 0.5s; }
        .slide.active { opacity: 1; visibility: visible; }
        .slide img { height: 80px; width: 80px; object-fit: cover; border-radius: 12px; margin-right: 15px; border: 2px solid var(--gold); }
        .slide-title { color: var(--gold); font-weight: 800; margin: 0; font-size: 1.1rem; }
        .slide-text { color: #ccc; font-size: 0.85rem; margin: 4px 0; }

        .card { background: var(--card-bg); color: var(--text); padding: 30px; border-radius: 30px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; width: 100%; max-width: 500px; }
        
        #ranking-box { display: none; position: absolute; inset: 0; background: white; z-index: 100; border-radius: 30px; padding: 25px; overflow-y: auto; }
        .rank-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; color: #333; font-weight: bold; }

        .accessibility-bar { background: #2c3e50; padding: 12px; border-radius: 15px; margin-bottom: 20px; width: 100%; display: flex; justify-content: space-around; flex-wrap: wrap; }
        .voice-toggle { background: var(--gold); border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; font-size: 0.8rem; }

        input[type="text"], input[type="number"] { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #ddd; text-align: center; font-size: 1.2rem; margin-bottom: 15px; }
        .avatar-grid { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .avatar-option { font-size: 1.8rem; cursor: pointer; padding: 10px; border-radius: 12px; border: 2px solid #eee; background: #f9f9f9; transition: 0.3s; }
        .avatar-option.selected { border-color: var(--accent); background: #fff0f1; transform: scale(1.1); }

        .lvl-btn { padding: 12px 15px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 8px; cursor: pointer; color: #333; font-weight: 700; background: white; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        
        .btn-main { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: 800; text-transform: uppercase; margin-top: 10px; font-size: 1rem; }
        
        .power-display { font-size: 4.5rem; font-weight: 900; color: var(--primary); margin: 20px 0; }
        .power-display sup { color: var(--accent); }

        #ans { font-size: 3rem; height: 80px; transition: none; }

        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 25px; border-radius: 25px; z-index: 2000; width: 90%; max-width: 400px; box-shadow: 0 0 100px #000; }
        .admin-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; }
        
        .visual-indicator { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; opacity: 0; pointer-events: none; z-index: 9999; }
        .visual-indicator.show { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    </style>
</head>
<body>

    <div class="visual-indicator" id="visualIndicator">✅</div>
    <div class="banner-wrapper" id="banner-area"></div>

    <div id="setup-screen" class="card">
        <div id="ranking-box">
            <h2 style="color:var(--primary)">🏆 TOP 10 RANKING</h2>
            <div id="ranking-list"></div>
            <button class="btn-main" onclick="document.getElementById('ranking-box').style.display='none'" style="background:#888">VOLTAR</button>
        </div>

        <div class="accessibility-bar">
            <button id="voice-toggle" class="voice-toggle" onclick="toggleVoice()">🔊 VOZ: LIGADA</button>
            <button class="voice-toggle" style="background:#3498db; color:white" onclick="alert('Use o teclado numérico para atacar!')">ℹ️ AJUDA</button>
        </div>

        <strong style="color:var(--accent)">👨‍🏫 Hilário Schwanz</strong>
        <h2 style="margin: 10px 0;">⚔️ BATALHA DAS POTÊNCIAS</h2>
        
        <input type="text" id="nome-aluno" placeholder="Nome do Guerreiro" oninput="validarProgresso()">
        
        <div class="avatar-grid">
            <div class="avatar-option selected" onclick="selAvatar(this, '⚔️')">⚔️</div>
            <div class="avatar-option" onclick="selAvatar(this, '🧙')">🧙</div>
            <div class="avatar-option" onclick="selAvatar(this, '⚡')">⚡</div>
            <div class="avatar-option" onclick="selAvatar(this, '🔥')">🔥</div>
        </div>

        <div id="lvls">
            <div class="lvl-btn" id="btn-0" onclick="selecionarNivel(0)"><span>🌟 Nível 1</span> <span>🔓</span></div>
            <div class="lvl-btn" id="btn-1" onclick="selecionarNivel(1)"><span>⚡ Nível 2</span> <span id="l1">🔒</span></div>
            <div class="lvl-btn" id="btn-2" onclick="selecionarNivel(2)"><span>🔥 Nível 3</span> <span id="l2">🔒</span></div>
            <div class="lvl-btn" id="btn-3" onclick="selecionarNivel(3)"><span>💪 Nível 4</span> <span id="l3">🔒</span></div>
            <div class="lvl-btn" id="btn-4" onclick="selecionarNivel(4)"><span>🏆 Nível 5</span> <span id="l4">🔒</span></div>
        </div>

        <button class="btn-main" onclick="tentarIniciar()">⚔️ INICIAR ⚔️</button>
        <button class="btn-main" style="background:var(--gold); color:#000" onclick="verRanking()">🏆 RANKING</button>
    </div>

    <div id="game-screen" class="card" style="display:none;">
        <div id="life-container" style="width:100%; background:#ddd; height:12px; border-radius:10px; margin-bottom:15px;">
            <div id="life-bar" style="width:100%; height:100%; background:var(--success); border-radius:10px;"></div>
        </div>
        <div style="display:flex; justify-content: space-between; font-weight: bold;">
            <span id="player-tag" style="font-size:1.5rem"></span>
            <span id="time-txt" style="font-size:1.5rem; color:var(--accent)">10s</span>
        </div>
        <div id="q-box" class="power-display">?<sup>?</sup></div>
        <input type="number" id="ans" inputmode="numeric">
        <button class="btn-main" onclick="check()">ATACAR!</button>
    </div>

    <footer onclick="abrirAdmin()" style="margin-top:20px; color:#555; cursor:pointer; font-size: 0.8rem;">© 2026 Hilário Schwanz | Painel Admin</footer>

    <div id="admin-panel">
        <h3>📢 Configurar Banner</h3>
        <select id="ad-slot" class="admin-input" onchange="carregarCamposAdmin()">
            <option value="1">Slot 1</option><option value="2">Slot 2</option><option value="3">Slot 3</option>
        </select>
        <input type="text" id="ad-title" placeholder="Título" class="admin-input">
        <input type="text" id="ad-desc" placeholder="Descrição" class="admin-input">
        <input type="text" id="ad-img" placeholder="URL da Imagem" class="admin-input">
        <input type="text" id="ad-link" placeholder="Link Destino" class="admin-input">
        <button class="btn-main" onclick="salvarGeral()" style="background:var(--success)">SALVAR</button>
        <button class="btn-main" style="background:#888" onclick="document.getElementById('admin-panel').style.display='none'">FECHAR</button>
    </div>

    <script>
        let avatarSel = "⚔️", curLvl = 0, slideIdx = 0, ativo = false, vida = 100, acertos = 0, tentativas = 0, res, crono, tempo;
        let lastB, lastE; // Variáveis para evitar repetição

        // Configurações de dificuldade ajustadas (Bases e Expoentes maiores)
        const conf = [
            {t:12, d:20, bases:[2,3,4,5,10], expos:[0,1,2,3]}, // Nível 1
            {t:10, d:25, bases:[2,3,4,5,6,10], expos:[2,3]},   // Nível 2
            {t:10, d:25, bases:[7,8,9,11,12], expos:[2]},      // Nível 3
            {t:8,  d:34, bases:[2,3,4,5], expos:[4,5]},        // Nível 4
            {t:8,  d:34, bases:[13,14,15,20,25], expos:[2]}    // Nível 5
        ];

        function renderBanners() {
            const area = document.getElementById('banner-area');
            let h = ''; let count = 0;
            for(let i=1; i<=3; i++) {
                const d = JSON.parse(localStorage.getItem('p_ad_'+i));
                if(d && d.title) {
                    h += `<div class="slide" onclick="window.open('${d.link}', '_blank')"><img src="${d.url}"><div class="slide-info"><p class="slide-title">${d.title}</p><p class="slide-text">${d.desc}</p></div></div>`;
                    count++;
                }
            }
            if(count === 0) area.innerHTML = '<div class="slide active" style="justify-content:center"><p class="slide-title">ANUNCIE AQUI</p></div>';
            else {
                area.innerHTML = h; const s = area.querySelectorAll('.slide'); s[0].classList.add('active');
                if(count > 1) setInterval(() => { s[slideIdx].classList.remove('active'); slideIdx = (slideIdx + 1) % s.length; s[slideIdx].classList.add('active'); }, 4000);
            }
        }

        function abrirAdmin() { if(prompt("Senha:") === "Food2024@") { document.getElementById('admin-panel').style.display='block'; carregarCamposAdmin(); } }
        function carregarCamposAdmin() {
            const slot = document.getElementById('ad-slot').value;
            const d = JSON.parse(localStorage.getItem('p_ad_'+slot)) || { title: "", desc: "", url: "", link: "" };
            document.getElementById('ad-title').value = d.title; document.getElementById('ad-desc').value = d.desc;
            document.getElementById('ad-img').value = d.url; document.getElementById('ad-link').value = d.link;
        }
        function salvarGeral() {
            const slot = document.getElementById('ad-slot').value;
            const obj = { title: document.getElementById('ad-title').value, desc: document.getElementById('ad-desc').value, url: document.getElementById('ad-img').value, link: document.getElementById('ad-link').value };
            localStorage.setItem('p_ad_'+slot, JSON.stringify(obj)); location.reload();
        }

        function validarProgresso() {
            const n = document.getElementById('nome-aluno').value.trim();
            const p = parseInt(localStorage.getItem('p_prog_'+n)) || 0;
            for(let i=1; i<=4; i++) { const el = document.getElementById('l'+i); if(el) el.innerText = p >= i ? "🔓" : "🔒"; }
        }

        function selecionarNivel(l) {
            const n = document.getElementById('nome-aluno').value.trim();
            if(!n) return alert("Digite seu nome primeiro!");
            const p = parseInt(localStorage.getItem('p_prog_'+n)) || 0;
            if(l > p) return alert("Desbloqueie este nível vencendo o anterior!");
            curLvl = l; document.querySelectorAll('.lvl-btn').forEach(b => b.style.background = "white");
            document.getElementById('btn-'+l).style.background = "#eee"; 
            falar("Nível " + (l+1));
        }

        function tentarIniciar() {
            const n = document.getElementById('nome-aluno').value;
            if(!n || n.length < 3) return alert("Digite seu nome (mínimo 3 letras)");
            document.getElementById('setup-screen').style.display='none';
            document.getElementById('game-screen').style.display='block';
            document.getElementById('player-tag').innerText = avatarSel;
            vida=100; acertos=0; tentativas=0; ativo=true; atualizarVida();
            rodar();
        }

        function rodar() {
            if(!ativo) return;
            clearInterval(crono);
            
            let b, e;
            // Loop para garantir que não repete a mesma conta seguida
            do {
                b = conf[curLvl].bases[Math.floor(Math.random() * conf[curLvl].bases.length)];
                e = conf[curLvl].expos[Math.floor(Math.random() * conf[curLvl].expos.length)];
            } while (b === lastB && e === lastE);
            
            lastB = b; lastE = e;
            res = Math.pow(b, e);
            
            document.getElementById('q-box').innerHTML = `${b}<sup>${e}</sup>`;
            const input = document.getElementById('ans');
            input.value = ""; 
            input.focus(); 

            setTimeout(() => falar(`${b} elevado a ${e}`), 10);
            
            tempo = conf[curLvl].t;
            document.getElementById('time-txt').innerText = tempo+"s";
            
            crono = setInterval(() => {
                tempo--;
                document.getElementById('time-txt').innerText = tempo+"s";
                if(tempo <= 0) {
                    clearInterval(crono);
                    vida -= conf[curLvl].d;
                    atualizarVida();
                    mostrarVisual('erro');
                    if(vida <= 0) finalizar(); else rodar();
                }
            }, 1000);
        }

        function check() {
            if(!ativo) return;
            const input = document.getElementById('ans');
            if(input.value === "") return;
            
            let v = parseInt(input.value);
            clearInterval(crono); 
            tentativas++;

            if(v === res) { 
                acertos++; 
                mostrarVisual('acerto');
                confetti({ particleCount: 40, spread: 50, origin: { y: 0.8 } }); 
            } else { 
                vida -= conf[curLvl].d; 
                mostrarVisual('erro'); 
            }

            atualizarVida();
            
            if(vida <= 0 || tentativas >= 15) {
                setTimeout(finalizar, 50);
            } else {
                rodar(); 
            }
        }

        function atualizarVida() { 
            const bar = document.getElementById('life-bar');
            bar.style.width = Math.max(0, vida) + "%";
            if(vida < 30) bar.style.background = "var(--danger)";
            else if(vida < 60) bar.style.background = "var(--gold)";
            else bar.style.background = "var(--success)";
        }

        function finalizar() {
            ativo = false; clearInterval(crono);
            const n = document.getElementById('nome-aluno').value.trim();
            const ef = Math.round((acertos/tentativas)*100) || 0;
            let r = JSON.parse(localStorage.getItem('p_rank')) || [];
            r.push({nome: n, avatar: avatarSel, efic: ef, lvl: (curLvl+1)});
            r.sort((a,b) => b.efic - a.efic);
            localStorage.setItem('p_rank', JSON.stringify(r.slice(0,10)));
            
            if(vida > 0) {
                const p = parseInt(localStorage.getItem('p_prog_'+n)) || 0;
                if(curLvl >= p) localStorage.setItem('p_prog_'+n, curLvl + 1);
                falar("Parabéns, você venceu!");
            } else {
                falar("Não foi dessa vez, tente de novo!");
            }
            alert(`Fim de jogo!\nAcertos: ${acertos}\nEficiência: ${ef}%`); 
            location.reload();
        }

        function verRanking() {
            const r = JSON.parse(localStorage.getItem('p_rank')) || [];
            document.getElementById('ranking-list').innerHTML = r.map((i, idx) => `<div class="rank-item"><span>${idx+1}º ${i.avatar} ${i.nome}</span><span>${i.efic}% (Niv ${i.lvl})</span></div>`).join('') || "Ainda não há recordes!";
            document.getElementById('ranking-box').style.display='block';
        }

        function selAvatar(el, icon) { document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected')); el.classList.add('selected'); avatarSel = icon; }
        
        let voiceEnabled = true;
        function falar(t) { 
            if(voiceEnabled && window.speechSynthesis) { 
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(t); 
                u.lang='pt-BR'; 
                u.rate = 1.2;
                window.speechSynthesis.speak(u); 
            } 
        }
        function toggleVoice() { voiceEnabled = !voiceEnabled; document.getElementById('voice-toggle').innerText = voiceEnabled ? "🔊 VOZ: LIGADA" : "🔇 VOZ: DESLIGADA"; }
        
        function mostrarVisual(tipo) {
            const ind = document.getElementById('visualIndicator');
            ind.innerHTML = tipo === 'acerto' ? '✅' : '❌';
            ind.style.color = tipo === 'acerto' ? '#27ae60' : '#e74c3c';
            ind.classList.add('show'); 
            setTimeout(() => ind.classList.remove('show'), 300);
        }

        window.onload = renderBanners;
        document.addEventListener("keydown", (e) => { 
            if(e.key === "Enter" && ativo) {
                e.preventDefault();
                check();
            }
        });
    </script>
</body>
</html>
