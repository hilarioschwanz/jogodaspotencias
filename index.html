<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha das Potências</title>
    <style>
        :root { 
            --primary: #0f3460; --accent: #e94560; --gold: #f1c40f; --success: #27ae60; 
            --dark: #1a1a2e; --card-bg: #ffffff; --text: #1a1a2e; --bg: #1a1a2e;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 10px; }

        /* BANNERS */
        .banner-wrapper { width: 100%; max-width: 800px; margin-bottom: 25px; background: #16213e; border-radius: 20px; border: 2px solid #444; overflow: hidden; position: relative; height: 110px; cursor: pointer; }
        .slide { position: absolute; inset: 0; display: flex; align-items: center; padding: 10px 20px; opacity: 0; transition: opacity 0.8s; visibility: hidden; }
        .slide.active { opacity: 1; visibility: visible; z-index: 5; }
        .slide img { height: 80px; width: 80px; border-radius: 12px; margin-right: 20px; border: 2px solid var(--gold); object-fit: cover; }
        .slide-title { color: var(--gold); font-weight: 800; margin: 0; font-size: 1.1rem; text-transform: uppercase; }
        .slide-text { color: #ccc; font-size: 0.85rem; margin: 4px 0; }

        /* CARD JOGO */
        .card { background: var(--card-bg); color: var(--text); padding: 30px; border-radius: 30px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); width: 100%; max-width: 500px; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: 800; text-transform: uppercase; margin-top: 12px; }
        .lvl-btn { padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 8px; cursor: pointer; color: #333; font-weight: 700; background: white; display: flex; justify-content: space-between; }
        .power-display { font-size: 4rem; font-weight: 900; color: var(--primary); margin: 20px 0; }
        #ans { width: 100%; max-width: 200px; font-size: 2.5rem; text-align: center; border-radius: 15px; border: 3px solid #eee; padding: 10px; }

        /* PAINEL ADMIN COM FUNÇÃO DE ESCOLHA REAL */
        #admin-panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #ffffff; color: #333; padding: 25px; border-radius: 25px; z-index: 9999; 
            width: 95%; max-width: 450px; box-shadow: 0 0 100px rgba(0,0,0,0.8); border: 3px solid var(--primary);
        }
        .admin-label { display: block; font-size: 14px; color: #444; margin-bottom: 8px; font-weight: bold; }
        
        /* ESTA É A CAIXA QUE AO CLICAR ABRE AS OPÇÕES */
        .admin-select {
            width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid var(--accent); 
            border-radius: 12px; font-size: 16px; background: #f9f9f9; color: var(--primary);
            cursor: pointer; font-weight: bold;
        }

        .admin-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 10px; font-size: 15px; }
        footer { margin-top: 60px; padding: 20px; text-align: center; font-size: 0.9rem; color: #888; cursor: pointer; }
    </style>
</head>
<body>

    <div class="banner-wrapper" id="banner-area"></div>

    <div id="setup-screen" class="card">
        <strong style="color:var(--accent)">👨‍🏫 Professor Hilário</strong>
        <h2>⚔️ BATALHA DAS POTÊNCIAS</h2>
        <input type="text" id="nome-aluno" placeholder="Digite seu nome" style="width:100%; padding:15px; border-radius:15px; border:2px solid #ddd; text-align: center;">
        <div id="lvls" style="margin-top:20px">
            <div class="lvl-btn" onclick="selecionarNivel(0)">Nível 1 🔓</div>
        </div>
        <button class="btn-main" onclick="tentarIniciar()">INICIAR JOGO</button>
    </div>

    <div id="game-screen" class="card" style="display:none;">
        <div id="q-box" class="power-display">?<sup>?</sup></div>
        <input type="number" id="ans" inputmode="numeric">
        <button class="btn-main" onclick="check()">ATACAR</button>
    </div>

    <footer onclick="abrirAdmin()">© 2026 Hilário Schwanz | Painel Admin</footer>

    <div id="admin-panel">
        <h3 style="margin-top:0; text-align:center; color:var(--primary)">Configurar Banners</h3>
        
        <label class="admin-label">Selecione o Slot para Editar:</label>
        <select id="ad-slot" class="admin-select" onchange="carregarCamposAdmin()">
            <option value="1">Slot 1</option>
            <option value="2">Slot 2</option>
            <option value="3">Slot 3</option>
            <option value="4">Slot 4</option>
            <option value="5">Slot 5</option>
        </select>

        <label class="admin-label">Nome do Negócio (Slot Selecionado):</label>
        <input type="text" id="ad-title" class="admin-input">
        
        <label class="admin-label">Descrição:</label>
        <input type="text" id="ad-desc" class="admin-input">
        
        <label class="admin-label">URL da Imagem:</label>
        <input type="text" id="ad-img" class="admin-input">
        
        <label class="admin-label">Link:</label>
        <input type="text" id="ad-link" class="admin-input">
        
        <button class="btn-main" onclick="salvarGeral()" style="background:var(--success)">SALVAR NESTE SLOT</button>
        <button class="btn-main" style="background:#888" onclick="document.getElementById('admin-panel').style.display='none'">FECHAR</button>
    </div>

    <script>
        let curLvl = 0, res, ativo = false, vida = 100, slideIdx = 0;

        // Função que carrega os dados nos campos toda vez que você muda o slot na caixa
        function carregarCamposAdmin() {
            const slot = document.getElementById('ad-slot').value;
            // Busca no banco de dados local o que tem salvo para o número escolhido
            const dadosSalvos = JSON.parse(localStorage.getItem('pot_ad_' + slot)) || { title: "", desc: "", url: "", link: "" };
            
            // Preenche as caixas de texto com o que foi encontrado
            document.getElementById('ad-title').value = dadosSalvos.title;
            document.getElementById('ad-desc').value = dadosSalvos.desc;
            document.getElementById('ad-img').value = dadosSalvos.url;
            document.getElementById('ad-link').value = dadosSalvos.link;
        }

        function salvarGeral() {
            const slot = document.getElementById('ad-slot').value;
            const obj = { 
                title: document.getElementById('ad-title').value, 
                desc: document.getElementById('ad-desc').value, 
                url: document.getElementById('ad-img').value, 
                link: document.getElementById('ad-link').value 
            };
            localStorage.setItem('pot_ad_' + slot, JSON.stringify(obj));
            alert("Informações salvas no Slot " + slot);
            location.reload(); // Recarrega para aplicar os banners novos
        }

        function abrirAdmin() { 
            if(prompt("Senha:") === "Food2024@") {
                document.getElementById('admin-panel').style.display='block';
                carregarCamposAdmin(); // Carrega o Slot 1 por padrão ao abrir
            }
        }

        function renderBanners() {
            const area = document.getElementById('banner-area');
            let htmlTotal = ''; let count = 0;
            for(let i=1; i<=5; i++) {
                const d = JSON.parse(localStorage.getItem('pot_ad_' + i));
                if(d && d.title) {
                    htmlTotal += `<div class="slide" onclick="window.open('${d.link}', '_blank')"><img src="${d.url}"><div class="slide-info"><p class="slide-title">${d.title}</p><p class="slide-text">${d.desc}</p></div></div>`;
                    count++;
                }
            }
            if(count === 0) {
                area.innerHTML = '<div class="slide active" style="justify-content:center"><p class="slide-title">SEM ANÚNCIOS ATIVOS</p></div>';
            } else {
                area.innerHTML = htmlTotal;
                const slides = area.querySelectorAll('.slide');
                slides[0].classList.add('active');
                if(count > 1) {
                    setInterval(() => {
                        slides[slideIdx].classList.remove('active');
                        slideIdx = (slideIdx + 1) % slides.length;
                        slides[slideIdx].classList.add('active');
                    }, 5000);
                }
            }
        }

        // Lógica simples do jogo para não dar erro
        function tentarIniciar() {
            document.getElementById('setup-screen').style.display='none';
            document.getElementById('game-screen').style.display='block';
            ativo=true; rodar();
        }
        function rodar() {
            let b = 2, e = 3; res = 8;
            document.getElementById('q-box').innerHTML = `${b}<sup>${e}</sup>`;
        }
        function check() {
            if(parseInt(document.getElementById('ans').value) === res) alert("Correto!");
            rodar();
        }

        window.onload = renderBanners;
    </script>
</body>
</html>
